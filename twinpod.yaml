linear:
  api_key_env: LINEAR_API_KEY

intake:
  poll_interval: 5s
  sources:
    - project_slug: "agent-v2-e6613e94140b"
      statuses: ["Todo", "Rework"]
      assignee: "me"
  claim:
    in_progress: "In Progress"
    review: "Human Review"
    failed: "Human Review"
    needs_info: "Human Review"

ci:
  command: npm run check

workflow:
  phases:
    - id: research-questions
      prompt: research-questions
      reads: [issue.md]
    - id: research
      prompt: research
    - id: plan
      prompt: plan
    - id: implement-plan
      prompt: implement-plan
      loop_until: ci_green
      cycles: 6
    - id: ship
      prompt: ship
      reads: [issue.md]
      gate: ci_green
