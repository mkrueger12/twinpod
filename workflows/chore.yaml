class: chore
phases:
  - id: planning
    agent: plan-agent
    prompt: prompts/chore-plan.md
    reads: [issue.md]
    writes: [plan.md]
  - id: implementation
    agent: build-agent
    prompt: prompts/chore-implement.md
    reads: [issue.md, plan.md]
    loop_until: ci_green
    budget: { usd: 1, cycles: 4 }
  - id: ship
    agent: ship-agent
    prompt: prompts/ship.md
    reads: [issue.md, plan.md]
    gate: ci_green
