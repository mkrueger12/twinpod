class: chore
phases:
  - id: planning
    prompt: chore-plan
    reads: [issue.md]
    writes: [plan.md]
  - id: implementation
    prompt: chore-implement
    reads: [issue.md, plan.md]
    loop_until: ci_green
    budget: { usd: 1, cycles: 4 }
  - id: ship
    prompt: ship
    reads: [issue.md, plan.md]
    gate: ci_green
