class: bug
phases:
  - id: reproduce
    prompt: reproduce-bug
    reads: [issue.md]
    writes: [repro.md]
  - id: implementation
    prompt: implement
    reads: [issue.md, repro.md]
    loop_until: ci_green
    budget: { usd: 2, cycles: 6 }
  - id: ship
    prompt: ship
    reads: [issue.md, repro.md]
    gate: ci_green
