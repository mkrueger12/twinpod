class: docs
phases:
  - id: planning
    agent: docs-agent
    prompt: prompts/docs-plan.md
    reads: [issue.md]
    writes: [plan.md]
  - id: implementation
    agent: docs-agent
    prompt: prompts/docs-implement.md
    reads: [issue.md, plan.md]
    loop_until: ci_green
    budget: { usd: 1, cycles: 3 }
  - id: ship
    agent: ship-agent
    prompt: prompts/ship.md
    reads: [issue.md, plan.md]
    gate: ci_green
