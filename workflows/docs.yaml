class: docs
phases:
  - id: planning
    prompt: docs-plan
    reads: [issue.md]
    writes: [plan.md]
  - id: implementation
    prompt: docs-implement
    reads: [issue.md, plan.md]
    loop_until: ci_green
    budget: { usd: 1, cycles: 3 }
  - id: ship
    prompt: ship
    reads: [issue.md, plan.md]
    gate: ci_green
