class: feature
phases:
  - id: design
    prompt: design
    reads: [issue.md]
    writes: [design.md]
  - id: planning
    prompt: planning
    reads: [issue.md, design.md]
    writes: [plan.md]
  - id: implementation
    prompt: implement
    reads: [issue.md, design.md, plan.md]
    loop_until: ci_green
    budget: { usd: 2, cycles: 6 }
  - id: ship
    prompt: ship
    reads: [issue.md, plan.md]
    gate: ci_green
