class: refactor
phases:
  - id: planning
    prompt: refactor-plan
    reads: [issue.md]
    writes: [plan.md]
  - id: implementation
    prompt: refactor-implement
    reads: [issue.md, plan.md]
    loop_until: ci_green
    budget: { usd: 2, cycles: 6 }
  - id: simplify
    prompt: simplify
    reads: [issue.md, plan.md]
    loop_until: ci_green
    budget: { usd: 1, cycles: 3 }
  - id: ship
    prompt: ship
    reads: [issue.md, plan.md]
    gate: ci_green
